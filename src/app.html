<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Anta&family=Goldman:wght@400;700&display=swap" rel="stylesheet">
		<link
		href="https://fonts.googleapis.com/css2?family=REM&display=swap" 
		rel="stylesheet">
		<script src="https://kit.fontawesome.com/6cf50e6673.js" crossorigin="anonymous"></script>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
		<!-- Apply color mode before render to prevent flash of wrong mode -->
		<script>
			(function() {
				var STORAGE_KEY = 'jdg-color-mode-preference';
				var saved = null;
				try { saved = localStorage.getItem(STORAGE_KEY); } catch(e) {}
				var prefersDark = saved === 'dark' ||
					(saved !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
				if (prefersDark) {
					document.documentElement.style.backgroundColor = 'rgb(30, 30, 30)';
					document.documentElement.style.colorScheme = 'dark';
					document.documentElement.dataset.theme = 'dark';
				}
			})();
			</script>
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
